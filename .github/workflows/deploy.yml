name: Deploy to GitHub Pages

on:
  push:
    branches: [master]      # любой push в master → пересборка и публикация
  workflow_dispatch:        # + можно запускать вручную из вкладки Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2          # в проекте bun.lock → собираем через bun
      - run: bun install --frozen-lockfile
      - run: bun run build                   # = tsc --noEmit && vite build → dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist                         # папка со сборкой

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
